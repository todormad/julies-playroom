<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" role="img" aria-label="Lost Robot Quest gameplay preview">
  <rect width="700" height="520" fill="#111"/>

  <!-- top-down map tiles -->
  <g transform="translate(40 36)">
    <rect width="620" height="448" rx="10" fill="#2e7d32"/>
    <g fill="#4caf50">
      <rect x="0" y="0" width="40" height="40"/><rect x="40" y="0" width="40" height="40"/><rect x="80" y="0" width="40" height="40"/>
      <rect x="0" y="40" width="40" height="40"/><rect x="80" y="40" width="40" height="40"/><rect x="120" y="40" width="40" height="40"/>
      <rect x="160" y="80" width="40" height="40"/><rect x="200" y="80" width="40" height="40"/><rect x="240" y="120" width="40" height="40"/>
      <rect x="320" y="160" width="40" height="40"/><rect x="360" y="200" width="40" height="40"/><rect x="400" y="240" width="40" height="40"/>
      <rect x="480" y="280" width="40" height="40"/><rect x="520" y="320" width="40" height="40"/>
    </g>
    <rect x="200" y="120" width="40" height="160" fill="#1e88e5" opacity=".95"/>
    <rect x="200" y="200" width="120" height="40" fill="#a1887f"/>
    <rect x="440" y="80" width="80" height="80" fill="#37474f" rx="4"/>
    <rect x="120" y="280" width="40" height="40" fill="#ffe082"/>
    <circle cx="300" cy="220" r="8" fill="#ffeb3b"/>
    <circle cx="340" cy="260" r="8" fill="#ff80ab"/>
    <circle cx="500" cy="180" r="8" fill="#ffeb3b"/>

    <!-- trees -->
    <g fill="#1b5e20">
      <circle cx="60" cy="60" r="16"/><rect x="56" y="68" width="8" height="12" fill="#5d4037"/>
      <circle cx="560" cy="100" r="16"/><rect x="556" y="108" width="8" height="12" fill="#5d4037"/>
      <circle cx="80" cy="360" r="16"/><rect x="76" y="368" width="8" height="12" fill="#5d4037"/>
    </g>

    <!-- Astro Buddy (small) -->
    <g transform="translate(250 300)">
      <rect x="8" y="8" width="24" height="22" rx="6" fill="#f7fbff"/>
      <rect x="12" y="2" width="16" height="8" rx="3" fill="#c7f2ff"/>
      <circle cx="16" cy="16" r="2.5" fill="#17324a"/>
      <circle cx="24" cy="16" r="2.5" fill="#17324a"/>
      <path d="M17 21 Q20 24 23 21" fill="none" stroke="#00a8cc" stroke-width="1.5"/>
    </g>

    <!-- Friendly Robot (large) -->
    <g transform="translate(470 250)">
      <rect x="0" y="10" width="52" height="48" rx="10" fill="#90caf9"/>
      <rect x="8" y="0" width="36" height="14" rx="5" fill="#64b5f6"/>
      <circle cx="18" cy="30" r="4" fill="#0d47a1"/>
      <circle cx="34" cy="30" r="4" fill="#0d47a1"/>
      <rect x="14" y="38" width="24" height="4" rx="2" fill="#1565c0"/>
      <rect x="-6" y="28" width="8" height="20" rx="3" fill="#64b5f6"/>
      <rect x="50" y="28" width="8" height="20" rx="3" fill="#64b5f6"/>
    </g>

    <!-- quest marker -->
    <g transform="translate(430 210)">
      <path d="M0,-14 L4,-4 H14 L6,2 L9,12 L0,6 L-9,12 L-6,2 L-14,-4 H-4 Z" fill="#ffeb3b" stroke="#f9a825" stroke-width="1"/>
    </g>
  </g>

  <text x="350" y="40" text-anchor="middle" fill="#e3f2fd" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700">Lost Robot Quest</text>
</svg>
