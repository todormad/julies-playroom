<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" role="img" aria-label="Astro Buddy Jump gameplay preview">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9de4ff"/>
      <stop offset="45%" stop-color="#d6f6ff"/>
      <stop offset="100%" stop-color="#e9fbff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd36d"/>
      <stop offset="100%" stop-color="#58b64a"/>
    </linearGradient>
    <linearGradient id="block" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c85ff"/>
      <stop offset="100%" stop-color="#7a5cff"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="100%" stop-color="#ffbf3c"/>
    </radialGradient>
  </defs>

  <rect width="700" height="520" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="560" cy="88" r="48" fill="#c8f2ff"/>

  <!-- clouds -->
  <g fill="#fff" opacity=".95">
    <ellipse cx="110" cy="88" rx="42" ry="18"/>
    <ellipse cx="145" cy="80" rx="28" ry="16"/>
    <ellipse cx="82" cy="82" rx="24" ry="14"/>
    <ellipse cx="280" cy="138" rx="36" ry="15"/>
    <ellipse cx="310" cy="130" rx="24" ry="13"/>
    <ellipse cx="530" cy="158" rx="40" ry="17"/>
    <ellipse cx="565" cy="150" rx="26" ry="14"/>
  </g>

  <!-- distant planets -->
  <circle cx="120" cy="72" r="11" fill="#7a5cff" opacity=".85"/>
  <circle cx="420" cy="98" r="8" fill="#00a8cc" opacity=".9"/>
  <circle cx="640" cy="120" r="10" fill="#7a5cff" opacity=".75"/>

  <!-- ground -->
  <rect x="0" y="370" width="700" height="150" fill="url(#ground)"/>
  <g fill="#58b64a">
    <rect x="0" y="396" width="18" height="42"/>
    <rect x="34" y="396" width="18" height="42"/>
    <rect x="68" y="396" width="18" height="42"/>
    <rect x="102" y="396" width="18" height="42"/>
    <rect x="136" y="396" width="18" height="42"/>
    <rect x="170" y="396" width="18" height="42"/>
    <rect x="204" y="396" width="18" height="42"/>
    <rect x="238" y="396" width="18" height="42"/>
    <rect x="272" y="396" width="18" height="42"/>
    <rect x="306" y="396" width="18" height="42"/>
    <rect x="340" y="396" width="18" height="42"/>
    <rect x="374" y="396" width="18" height="42"/>
    <rect x="408" y="396" width="18" height="42"/>
    <rect x="442" y="396" width="18" height="42"/>
    <rect x="476" y="396" width="18" height="42"/>
    <rect x="510" y="396" width="18" height="42"/>
    <rect x="544" y="396" width="18" height="42"/>
    <rect x="578" y="396" width="18" height="42"/>
    <rect x="612" y="396" width="18" height="42"/>
    <rect x="646" y="396" width="18" height="42"/>
  </g>

  <!-- obstacles -->
  <rect x="180" y="310" width="54" height="60" rx="10" fill="url(#block)"/>
  <rect x="186" y="318" width="42" height="10" rx="6" fill="#b8a8ff"/>
  <rect x="390" y="286" width="62" height="84" rx="10" fill="url(#block)"/>
  <rect x="396" y="294" width="50" height="10" rx="6" fill="#b8a8ff"/>
  <rect x="560" y="322" width="48" height="48" rx="10" fill="url(#block)"/>
  <rect x="566" y="330" width="36" height="10" rx="6" fill="#b8a8ff"/>

  <!-- stars -->
  <g transform="translate(300 250)">
    <polygon points="0,-16 4,-5 16,-5 6,2 10,14 0,7 -10,14 -6,2 -16,-5 -4,-5" fill="url(#starGlow)"/>
  </g>
  <g transform="translate(470 220)">
    <polygon points="0,-12 3,-4 12,-4 4,1 7,10 0,5 -7,10 -4,1 -12,-4 -3,-4" fill="url(#starGlow)"/>
  </g>
  <g transform="translate(620 280)">
    <polygon points="0,-14 3.5,-4.5 14,-4.5 5.5,1.5 9,12 0,6 -9,12 -5.5,1.5 -14,-4.5 -3.5,-4.5" fill="url(#starGlow)"/>
  </g>

  <!-- Astro Buddy -->
  <g transform="translate(248 318)">
    <rect x="4" y="4" width="44" height="40" rx="10" fill="#f7fbff"/>
    <rect x="9" y="0" width="24" height="12" rx="5" fill="#c7f2ff"/>
    <circle cx="18" cy="16" r="3" fill="#17324a"/>
    <circle cx="34" cy="16" r="3" fill="#17324a"/>
    <path d="M19 24 Q26 31 33 24" fill="none" stroke="#00a8cc" stroke-width="3" stroke-linecap="round"/>
    <path d="M10 40 L7 52 M42 40 L45 52" fill="none" stroke="#7a5cff" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M4 28 L-4 32 M48 28 L56 32" fill="none" stroke="#c7f2ff" stroke-width="2" stroke-linecap="round"/>
    <polygon points="26,-8 28,-2 34,-2 29,2 31,8 26,4 21,8 23,2 18,-2 24,-2" fill="#fff176" stroke="#e89a00" stroke-width="1"/>
  </g>

  <!-- HUD-style progress hint -->
  <g opacity=".9">
    <rect x="18" y="18" width="132" height="28" rx="14" fill="rgba(255,255,255,.82)" stroke="rgba(12,77,115,.16)"/>
    <circle cx="36" cy="32" r="6" fill="#ffbf3c"/>
    <circle cx="54" cy="32" r="6" fill="#ffbf3c"/>
    <circle cx="72" cy="32" r="6" fill="#ffbf3c"/>
    <circle cx="90" cy="32" r="6" fill="rgba(255,191,60,.35)" stroke="#ffbf3c" stroke-width="1.5"/>
    <circle cx="108" cy="32" r="6" fill="rgba(255,255,255,.8)" stroke="rgba(12,77,115,.16)" stroke-width="1.5"/>
    <circle cx="126" cy="32" r="6" fill="rgba(255,255,255,.8)" stroke="rgba(12,77,115,.16)" stroke-width="1.5"/>
  </g>
</svg>
